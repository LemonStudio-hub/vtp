name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/lib/vtp-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --manifest-path src/lib/vtp-core/Cargo.toml -- --check

      - name: Run clippy
        run: cargo clippy --manifest-path src/lib/vtp-core/Cargo.toml -- -D warnings

      - name: Run unit tests
        run: cargo test --manifest-path src/lib/vtp-core/Cargo.toml --lib --target x86_64-unknown-linux-gnu

      - name: Run integration tests
        run: cargo test --manifest-path src/lib/vtp-core/Cargo.toml --tests --target x86_64-unknown-linux-gnu

      - name: Run doc tests
        run: cargo test --manifest-path src/lib/vtp-core/Cargo.toml --doc --target x86_64-unknown-linux-gnu

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Svelte check
        run: npm run check

      - name: Run linting
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [rust-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: npm ci

      - name: Build Wasm
        run: npm run wasm:build

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
